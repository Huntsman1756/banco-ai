# Banco AI - Nginx Reverse Proxy Configuration
# Place this file at /etc/nginx/sites-available/banco-ai
# Then: ln -s /etc/nginx/sites-available/banco-ai /etc/nginx/sites-enabled/

# ─── HTTP → HTTPS redirect ───────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name banco-ai.nan.cloud;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS main server ───────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name banco-ai.nan.cloud;

    # SSL
    ssl_certificate /etc/letsencrypt/live/banco-ai.nan.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/banco-ai.nan.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/banco-ai-access.log;
    error_log /var/log/nginx/banco-ai-error.log;

    # Client body size (PDF uploads up to 50MB)
    client_max_body_size 50M;

    # Timeouts
    proxy_connect_timeout 30s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Proxy to Banco AI Node.js app
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;

        # Disable buffering for streaming responses
        proxy_buffering off;
    }

    # Health check endpoint (allow without proxy)
    location /health {
        proxy_pass http://127.0.0.1:3000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
