services:
  web:
    build: .
    command: ["node", "dist/entrypoints/web.js"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health',(r)=>process.exit(r.statusCode===200?0:1))\""]
      interval: 30s
      timeout: 5s
      retries: 3

  telegram:
    build: .
    command: ["node", "dist/entrypoints/telegram.js"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  scheduler:
    build: .
    command: ["node", "dist/entrypoints/scheduler.js"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
